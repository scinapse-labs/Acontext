version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/src/server/api/go"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "deps"
    commit-message:
      prefix: "chore(deps):"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/src/client/acontext-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "deps"
    commit-message:
      prefix: "chore(deps):"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/src/server/core"
    schedule:
