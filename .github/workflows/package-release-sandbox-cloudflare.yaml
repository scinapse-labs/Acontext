name: Package Sandbox Cloudflare Release

on:
  push:
    tags:
      - 'package-sandbox-cloudflare/v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/packages/sandbox-cloudflare
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: src/packages/sandbox-cloudflare/package.json

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Extract version from tag
        id: tag_version
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            TAG_NAME=${GIT_REF#refs/tags/package-sandbox-cloudflare/v}
            echo "tag_version=$TAG_NAME" >> "$GITHUB_OUTPUT"
            echo "Tag version: $TAG_NAME"
          else
            echo "tag_version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches tag
        if: steps.tag_version.outputs.tag_version != ''
        run: |
          PKG_VERSION="${{ steps.version.outputs.version }}"
          TAG_VERSION="${{ steps.tag_version.outputs.tag_version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Error: Package version ($PKG_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version match: $PKG_VERSION"

      - name: Check if version exists on npm
        id: check_version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "@acontext/create-sandbox-cloudflare@$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already exists on npm"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION does not exist on npm"
          fi

      - name: Publish to npm
        if: steps.check_version.outputs.exists == 'false'
        # Auth via OIDC trusted publishers (id-token: write) — do NOT set NODE_AUTH_TOKEN
        run: npx npm@latest publish --access public --provenance
        # Note: prepublishOnly script in package.json will automatically:
        # 1. Copy template files from src/server/sandbox/cloudflare to template/
        # 2. Replace template variables in package.json and wrangler.jsonc

      - name: Publish skipped (version exists)
        if: steps.check_version.outputs.exists == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Publishing skipped - version $VERSION already exists on npm"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          TAG_NAME=${GIT_REF#refs/tags/package-sandbox-cloudflare/v}
          echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate Changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_OUTPUT: ${{ github.workspace }}-CHANGELOG.txt
        run: |
          FOOTER=$(printf '%s\n' \
            "Published to npm as @acontext/create-sandbox-cloudflare@${VERSION}" \
            "" \
            "## Usage" \
            "" \
            '```bash' \
            "npm create @acontext/sandbox-cloudflare@${VERSION} my-app" \
            "# or" \
            "npx @acontext/create-sandbox-cloudflare@${VERSION} my-app" \
            '```')
          bash .github/scripts/generate-changelog.sh \
            --tag-prefix "package-sandbox-cloudflare/v" \
            --source-dir "src/packages/sandbox-cloudflare" \
            --display-name "Package Sandbox Cloudflare" \
            --output "$CHANGELOG_OUTPUT" \
            --footer "$FOOTER"

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          body_path: ${{ github.workspace }}-CHANGELOG.txt
